<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2&3Dix v1.1 - Ambiente de Desenvolvimento 3D</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FontLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/TextGeometry.js"></script>

    <style>
        /* Variáveis de Cores para Controle Total dos Modos Escuro e Claro */
        :root {
            --bg-page: #121212;
            --bg-card: #1e1e1e;
            --border-ui: #333333;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --input-bg: #252526;
            --input-text: #ffffff;
            --btn-bg: #007acc;
            --btn-hover: #0098ff;
            --console-bg: #1e1e1e;
        }

        body.light-mode {
            --bg-page: #f4f4f7;
            --bg-card: #ffffff;
            --border-ui: #cccccc;
            --text-main: #111111;
            --text-muted: #555555;
            --input-bg: #ffffff;
            --input-text: #111111;
            --btn-bg: #007acc;
            --btn-hover: #005999;
            --console-bg: #ffffff;
        }

        /* Organização Estritamente Vertical */
        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.2s, color 0.2s;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 850px;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            border-bottom: 2px solid var(--border-ui);
            padding-bottom: 10px;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        .lema {
            font-style: italic;
            color: var(--text-muted);
            margin-top: -5px;
            margin-bottom: 10px;
            font-size: 14px;
            align-self: flex-start;
        }

        .theme-toggle {
            background-color: var(--btn-bg);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        label {
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        textarea {
            width: 100%;
            height: 220px;
            background-color: var(--input-bg);
            color: var(--input-text);
            border: 2px solid var(--border-ui);
            border-radius: 6px;
            padding: 12px;
            box-sizing: border-box;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        .btn-compile {
            background-color: var(--btn-bg);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-compile:hover {
            background-color: var(--btn-hover);
        }

        /* Espaço do Canvas 3D Deslizável */
        #canvas-wrapper {
            width: 100%;
            height: 480px;
            background-color: #0a0a0a;
            border: 2px solid var(--border-ui);
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            touch-action: none !important;
        }

        #canvas-wrapper canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* Painel de Saída (Console) */
        .output-box {
            width: 100%;
            background-color: var(--console-bg);
            color: var(--input-text);
            border: 2px solid var(--border-ui);
            border-radius: 6px;
            padding: 15px;
            box-sizing: border-box;
            font-family: "Courier New", Courier, monospace;
            font-size: 14px;
            min-height: 90px;
            white-space: pre-wrap;
            transition: background-color 0.2s, border-color 0.2s, color 0.2s;
        }

        footer {
            margin-top: 30px;
            border-top: 1px solid var(--border-ui);
            width: 100%;
            padding-top: 15px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>2&3Dix v1.1 3D</h1>
            <button class="theme-toggle" onclick="toggleThemeMode()">Alternar Tema</button>
        </header>
        <div class="lema">"Se não souber desenhar, programe-o"</div>

        <label for="editor">Entrada de Código (Script 2&3Dix)</label>
        <textarea id="editor" placeholder="Insira o seu código aqui..."></textarea>
        
        <button class="btn-compile" onclick="executarTranspilador()">Compilar e Renderizar Cenário</button>

        <label>Visualização do Desenho 3D (Deslize para rotacionar)</label>
        <div id="canvas-wrapper"></div>

        <label for="console-out">Saída de Texto (Console)</label>
        <div class="output-box" id="console-out">Aguardando execução do compilador...</div>

        <footer>
            © 2026 <span id="autor-placeholder">Yudhi Gerson</span>. Todos os direitos reservados.
        </footer>
    </div>

    <script>
        // --- GERENCIAMENTO DE TEMAS ---
        function toggleThemeMode() {
            document.body.classList.toggle('light-mode');
            if (document.body.classList.contains('light-mode')) {
                scene.background.setHex(0xe1e1e6);
                gridHelper.material.color.setHex(0xaaaaaa);
            } else {
                scene.background.setHex(0x0a0a0a);
                gridHelper.material.color.setHex(0x444444);
            }
        }

        // --- AMBIENTE GRÁFICO THREE.JS ---
        const wrapper = document.getElementById('canvas-wrapper');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(45, wrapper.clientWidth / wrapper.clientHeight, 0.1, 1000);
        camera.position.set(80, 60, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(wrapper.clientWidth, wrapper.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        wrapper.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Isolamento de toque para garantir o deslizamento do objeto sem arrastar a página
        const impedirScroll = (e) => { e.stopPropagation(); };
        renderer.domElement.addEventListener('touchstart', impedirScroll, { passive: true });
        renderer.domElement.addEventListener('touchmove', function(e) { e.preventDefault(); e.stopPropagation(); }, { passive: false });

        // Iluminação
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
        dirLight.position.set(40, 150, 50);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 300;
        const d = 120;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        scene.add(dirLight);

        // Grid Plane (Plano de Grade Tridimensional de Editores 3D)
        const gridHelper = new THREE.GridHelper(300, 60, 0x007acc, 0x444444);
        gridHelper.position.y = -30;
        scene.add(gridHelper);

        // Sombra Projetada no Grid
        const shadowFloorGeo = new THREE.PlaneGeometry(2000, 2000);
        const shadowFloorMat = new THREE.ShadowMaterial({ opacity: 0.4 });
        const shadowFloor = new THREE.Mesh(shadowFloorGeo, shadowFloorMat);
        shadowFloor.rotation.x = -Math.PI / 2;
        shadowFloor.position.y = -30.05;
        shadowFloor.receiveShadow = true;
        scene.add(shadowFloor);

        let grupoCenario = new THREE.Group();
        scene.add(grupoCenario);

        // Carregamento da Fonte 3D Mecânica
        let fonteGlobal3D = null;
        const loader = new THREE.FontLoader();
        loader.load('https://unpkg.com/three@0.128.0/examples/fonts/helvetiker_regular.typeface.json', function(font) {
            fonteGlobal3D = font;
            carregarExemploInicial();
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = wrapper.clientWidth / wrapper.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(wrapper.clientWidth, wrapper.clientHeight);
        });

        // --- CORREÇÃO DO BUG: ALINHAMENTO CORRETO DOS DOIS PONTOS DA LINHA ---
        function construirLinhaEntrePontos(p1, p2, material) {
            const v1 = new THREE.Vector3(p1[0], p1[1], p1[2]);
            const v2 = new THREE.Vector3(p2[0], p2[1], p2[2]);
            const distancia = v1.distanceTo(v2);
            
            // Cria uma estrutura cilíndrica volumétrica
            const geometriaLinha = new THREE.CylinderGeometry(1.5, 1.5, distancia, 8);
            const meshLinha = new THREE.Mesh(geometriaLinha, material);
            
            // Posiciona exatamente no ponto central entre as duas coordenadas
            meshLinha.position.copy(v1).add(v2).multiplyScalar(0.5);
            
            // Corrige o vetor de direção do cilindro para apontar do Ponto 1 ao Ponto 2
            const direcao = new THREE.Vector3().subVectors(v2, v1).normalize();
            const eixoPadrao = new THREE.Vector3(0, 1, 0);
            
            // CORRIGIDO: Modificado de 'eisoPadrao' para 'eixoPadrao' (Linha estável e funcional!)
            meshLinha.quaternion.setFromUnitVectors(eixoPadrao, direcao);
            
            meshLinha.castShadow = true;
            meshLinha.receiveShadow = true;
            return meshLinha;
        }

        // --- PARSER E TRANSPILADOR DE DUAS PASSAGENS ---
        function carregarExemploInicial() {
            document.getElementById('editor').value = 
`varSelector:
  Pixel = 30px
  RaioBase = 15px
  Calculo = RaioBase * 2

blue:
  color = blue

cube (class = "blue"):
  size = Pixel
  position = -45px 0px 0px

cylinder (id = "meu_cilindro"):
  color = #ff2255
  size = 20px 50px 20px
  position = 0px 5px 0px

3-prism (class = "blue"):
  size = 25px 40px 25px
  position = 45px 0px 0px

text:
  color = #ffaa00
  size = 10px
  position = -55px -20px 30px

line:
  color = green
  position = -50px -25px 30px 50px -25px 30px

print -> "Vamos aplicar comprimento em v1.1 de 2&3dix!"
print -> Calculo`;
            executarTranspilador();
        }

        function executarTranspilador() {
            const textoCodigo = document.getElementById('editor').value;
            const consoleUI = document.getElementById('console-out');
            consoleUI.textContent = ""; 
            
            // Limpeza de memória gráfica anterior
            grupoCenario.children.forEach(child => {
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
            });
            scene.remove(grupoCenario);
            grupoCenario = new THREE.Group();
            scene.add(grupoCenario);

            const linhas = textoCodigo.split('\n');
            
            let bancoVariaveis = {};
            let bancoClasses = {};
            let filaObjetos = [];
            
            const regexObjeto = /^(cube|sphere|torus|cylinder|text|line|\d+-prism|n-prism|pyramid-\d+)/i;

            // Passagem 1: Mapear Variáveis e Classes
            let modo = null;
            let classeAtual = null;

            for (let i = 0; i < linhas.length; i++) {
                let linha = linhas[i].trim();
                if (!linha || linha.startsWith('>>')) continue;

                if (linha.startsWith('varSelector:')) {
                    modo = 'varSelector';
                    continue;
                }
                if (linha.match(regexObjeto)) {
                    modo = 'objeto';
                    continue;
                }
                if (linha.endsWith(':') && !linha.includes('(')) {
                    modo = 'classe';
                    classeAtual = linha.replace(':', '').trim();
                    bancoClasses[classeAtual] = {};
                    continue;
                }

                if (linha.includes('=')) {
                    let partes = lineSplit(linha);
                    let chave = partes[0];
                    let valor = partes[1];

                    if (modo === 'varSelector') {
                        bancoVariaveis[chave] = valor;
                    } else if (modo === 'classe' && classeAtual) {
                        bancoClasses[classeAtual][chave] = valor;
                    }
                }
            }

            // Resolver cálculos matemáticos internos
            for (let chave in bancoVariaveis) {
                bancoVariaveis[chave] = processarCalculoAritmetico(bancoVariaveis[chave], bancoVariaveis);
            }

            // Passagem 2: Identificar Elementos e Executar Prints
            modo = null;
            let objetoAtual = null;

            for (let i = 0; i < linhas.length; i++) {
                let linha = linhas[i].trim();
                if (!linha || linha.startsWith('>>')) continue;

                if (linha.startsWith('varSelector:')) {
                    modo = 'varSelector';
                    continue;
                }
                if (linha.startsWith('print ->')) {
                    let expressao = linha.split('print ->')[1].trim();
                    let saidaLimpa = processarPrintDireto(expressao, bancoVariaveis);
                    consoleUI.textContent += saidaLimpa + "\n";
                    continue;
                }

                if (linha.match(regexObjeto)) {
                    modo = 'objeto';
                    let cabecalho = linha.endsWith(':') ? linha.slice(0, -1).trim() : AppTrimmer(linha);
                    let tipoPrimitivo = cabecalho.split(/[ \((]/)[0].trim();
                    let idCapturado = cabecalho.match(/id\s*=\s*["']([^"']+)["']/);
                    let classeCapturada = cabecalho.match(/class\s*=\s*["']([^"']+)["']/);
                    
                    objetoAtual = {
                        tipo: tipoPrimitivo,
                        id: idCapturado ? idCapturado[1] : null,
                        classe: classeCapturada ? classeCapturada[1] : null,
                        propriedades: {}
                    };
                    filaObjetos.push(objetoAtual);
                    if (!linha.endsWith(':')) objetoAtual = null;
                    continue;
                }

                if (linha.endsWith(':') && !linha.includes('(')) {
                    modo = 'classe';
                    continue;
                }

                if (linha.includes('=') && modo === 'objeto' && objetoAtual) {
                    let partes = lineSplit(linha);
                    objetoAtual.propriedades[partes[0]] = partes[1];
                }
            }

            // Passagem 3: Renderizar Elementos no Canvas
            filaObjetos.forEach(obj => {
                let propriedadesAgrupadas = {};
                if (obj.classe && bancoClasses[obj.classe]) {
                    propriedadesAgrupadas = { ...bancoClasses[obj.classe] };
                }
                propriedadesAgrupadas = { ...propriedadesAgrupadas, ...obj.propriedades };

                // Tamanho Unificado Automático (X, Y, Z idênticos se passar apenas 1 valor)
                let dimensoes = [20, 20, 20];
                if (propriedadesAgrupadas['size']) {
                    let termos = propriedadesAgrupadas['size'].split(/\s+/);
                    let processados = termos.map(t => converterTokenParaNumero(t, bancoVariaveis));
                    if (processados.length === 1) {
                        dimensoes = [processados[0], processados[0], processados[0]];
                    } else if (processados.length >= 3) {
                        dimensoes = [processados[0], processados[1], processados[2]];
                    }
                }

                let corHex = propriedadesAgrupadas['color'] || "red";
                corHex = extrairStringPura(corHex, bancoVariaveis);
                let mat = new THREE.MeshStandardMaterial({ color: corHex, roughness: 0.4, metalness: 0.1 });
                let mesh = null;

                // Captura e renderiza a linha usando os 6 eixos de posição (Dois pontos X, Y, Z)
                if (obj.tipo === 'line') {
                    let p1 = [0, 0, 0];
                    let p2 = [30, 0, 0]; 
                    
                    if (propriedadesAgrupadas['position']) {
                        let eixos = propriedadesAgrupadas['position'].split(/\s+/);
                        let eixosProc = eixos.map(e => converterTokenParaNumero(e, bancoVariaveis));
                        
                        if (eixosProc.length >= 6) {
                            p1 = [eixosProc[0], eixosProc[1], eixosProc[2]];
                            p2 = [eixosProc[3], eixosProc[4], eixosProc[5]];
                        } else if (eixosProc.length >= 3) {
                            p1 = [0, 0, 0];
                            p2 = [eixosProc[0], eixosProc[1], eixosProc[2]];
                        }
                    }
                    mesh = construirLinhaEntrePontos(p1, p2, mat);
                } else {
                    // Posicionamento Padrão de 3 Eixos para os demais objetos tridimensionais
                    let posicao = [0, 0, 0];
                    if (propriedadesAgrupadas['position']) {
                        let eixos = propriedadesAgrupadas['position'].split(/\s+/);
                        let eixosProc = eixos.map(e => converterTokenParaNumero(e, bancoVariaveis));
                        if (eixosProc.length >= 3) posicao = [eixosProc[0], eixosProc[1], eixosProc[2]];
                    }

                    let geom;
                    let matchPrisma = obj.tipo.match(/^(\d+)-prism$/);
                    let matchPiramide = obj.tipo.match(/^pyramid-(\d+)$/);

                    if (matchPrisma) {
                        let lados = parseInt(matchPrisma[1], 10);
                        geom = new THREE.CylinderGeometry(dimensoes[0]/2, dimensoes[0]/2, dimensoes[1], lados);
                        mesh = new THREE.Mesh(geom, mat);
                    } else if (matchPiramide) {
                        let lados = parseInt(matchPiramide[1], 10);
                        geom = new THREE.CylinderGeometry(0, dimensoes[0]/2, dimensoes[1], lados);
                        mesh = new THREE.Mesh(geom, mat);
                    } else {
                        switch (obj.tipo) {
                            case 'cube':
                                geom = new THREE.BoxGeometry(dimensoes[0], dimensoes[1], dimensoes[2]);
                                mesh = new THREE.Mesh(geom, mat);
                                break;
                            case 'sphere':
                                geom = new THREE.SphereGeometry(dimensoes[0] / 2, 32, 32);
                                mesh = new THREE.Mesh(geom, mat);
                                break;
                            case 'torus':
                                geom = new THREE.TorusGeometry(dimensoes[0]/2, dimensoes[1]/6, 16, 100);
                                mesh = new THREE.Mesh(geom, mat);
                                break;
                            case 'cylinder':
                                geom = new THREE.CylinderGeometry(dimensoes[0]/2, dimensoes[0]/2, dimensoes[1], 32);
                                mesh = new THREE.Mesh(geom, mat);
                                break;
                            case 'text':
                                if (fonteGlobal3D) {
                                    geom = new THREE.TextGeometry('2&3Dix 3D', {
                                        font: fonteGlobal3D,
                                        size: dimensoes[0] || 8,
                                        height: 5, // Volume 3D extrudado real
                                        curveSegments: 6
                                    });
                                    mesh = new THREE.Mesh(geom, mat);
                                }
                                break;
                        }
                    }

                    if (mesh) {
                        mesh.position.set(posicao[0], posicao[1], posicao[2]);
                    }
                }

                if (mesh) {
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    grupoCenario.add(mesh);
                }
            });

            if (consoleUI.textContent === "") {
                consoleUI.textContent = "Compilação concluída com sucesso!";
            }
        }

        // --- ENGENHARIA DE STRINGS E TRATAMENTO SINTÁTICO ---
        function lineSplit(str) {
            let idx = str.indexOf('=');
            return [str.slice(0, idx).trim(), str.slice(idx + 1).trim()];
        }

        function AppTrimmer(str) { return str.trim(); }

        function converterTokenParaNumero(tokenStr, vars) {
            tokenStr = tokenStr.trim();
            if (vars[tokenStr] !== undefined) tokenStr = vars[tokenStr].toString();
            return parseFloat(tokenStr.replace(/px/gi, '')) || 0;
        }

        function extrairStringPura(tokenStr, vars) {
            if (vars[tokenStr] !== undefined) return vars[tokenStr].toString().replace(/["']/g, "");
            return tokenStr.replace(/["']/g, "");
        }

        function processarCalculoAritmetico(expressao, vars) {
            let formula = expressao.replace(/px/gi, '');
            let chavesOrdenadas = Object.keys(vars).sort((a, b) => b.length - a.length);
            for (let chave of chavesOrdenadas) {
                let val = vars[chave].toString().replace(/px/gi, '');
                formula = formula.replace(new RegExp('\\b' + chave + '\\b', 'g'), val);
            }
            try { return Function('"use strict";return (' + formula + ')')(); } catch (e) { return expressao.trim(); }
        }

        function processarPrintDireto(expressao, vars) {
            expressao = expressao.trim();
            if ((expressao.startsWith('"') && expressao.endsWith('"')) || (expressao.startsWith("'") && expressao.endsWith("'"))) {
                return expressao.slice(1, -1);
            }
            if (vars[expressao] !== undefined) return vars[expressao].toString().replace(/px/gi, '');
            return expressao.replace(/px/gi, '');
        }
    </script>
</body>
</html>
